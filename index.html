<!DOCTYPE html>
<html>
<head>
    <title>Prime Game</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 80px;
        }

        input {
            font-size: 20px;
            text-align: center;
            padding: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-top: 10px;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>

<body>

<h1>Prime Game</h1>

<input id="inputBox" type="text" placeholder="Enter next prime">
<br>
<button onclick="submitNumber()">Submit</button>

<div id="result">Enter the first prime (2)</div>

<script>
let streak = 0;
let best = localStorage.getItem("best") || 0;
let expected = 2;

function isPrime(n) {
    if (n < 2) return false;
    for (let i = 2; i <= Math.sqrt(n); i++) {
        if (n % i === 0) return false;
    }
    return true;
}

function nextPrime(n) {
    let c = n + 1;
    while (true) {
        if (isPrime(c)) return c;
        c++;
    }
}

function submitNumber() {
    let input = document.getElementById("inputBox");
    let num = parseInt(input.value);

    input.value = "";

    if (num === expected) {
        streak++;

        expected = nextPrime(expected);

        if (streak > best) {
            best = streak;
            localStorage.setItem("best", best);
        }

        document.getElementById("result").innerHTML =
            `Correct! Streak: ${streak} | Best: ${best}`;
    } else {
        streak = 0;
        expected = 2;

        document.getElementById("result").innerHTML =
            `Wrong! Reset.`;
    }
}

document.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        submitNumber();
    }
});
</script>

</body>
</html>
